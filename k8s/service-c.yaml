# service-c: Extra authenticated service
apiVersion: v1
kind: Service
metadata:
  name: service-c
  namespace: mesh-demo
spec:
  selector:
    app: service-c
  ports:
    - port: 8080
      targetPort: 5678
      name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-c
  namespace: mesh-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-c
  template:
    metadata:
      labels:
        app: service-c
    spec:
      containers:
        - name: app
          image: hashicorp/http-echo
          args: ["-text", "Response from service-c (mTLS only)"]